name: Release & Publish to NPM

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # id-token: write enables npm "Trusted Publishing" (OIDC) — @semantic-release/npm
    # already tries this automatically before falling back to NPM_TOKEN. This half of
    # the setup (the workflow side) is done; the other half still needs one manual,
    # one-time step on npmjs.com that only the package owner can do (OIDC needs no
    # secret, so an agent can't complete it): go to
    # https://www.npmjs.com/package/itwillsync/access → Trusted Publisher → GitHub
    # Actions, and set Organization/user "shrijayan", Repository "itwillsync",
    # Workflow filename "release.yml" (no environment). Once that's set, publishing
    # no longer depends on NPM_TOKEN ever expiring again — see agentlog.md for why
    # this was added (NPM_TOKEN has been silently expired since ~May 2026).
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Install native build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
