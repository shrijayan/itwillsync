name: Dependabot Auto-Merge

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Log update info
        run: |
          echo "Dependency: ${{ steps.metadata.outputs.dependency-names }}"
          echo "Update type: ${{ steps.metadata.outputs.update-type }}"

      # main's ruleset requires 1 approving review + rebase-only merge.
      # RELEASE_TOKEN authenticates as the repo admin (same token release.yml
      # uses to push semantic-release commits straight to main), which has
      # standing bypass rights on that ruleset — so it can approve its own
      # merge and rebase-merge without waiting on a human. GITHUB_TOKEN
      # cannot approve a PR opened by the same workflow run's actor and has
      # no bypass, so it would get stuck on the review requirement.
      - name: Approve PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Enable auto-merge (rebase)
        run: gh pr merge --auto --rebase "$PR_URL" || true
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
