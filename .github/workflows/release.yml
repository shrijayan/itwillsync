name: Release & Publish to NPM

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # id-token: write enables npm "Trusted Publishing" (OIDC), which @semantic-release/npm
    # tries automatically before falling back to NPM_TOKEN. Turns out this was ALREADY
    # configured on npmjs.com for this package (verified empirically: publishing itwillsync
    # 1.10.1 succeeded via pure OIDC, no working NPM_TOKEN involved) - id-token: write plus
    # upgrading npm below were the only 2 things actually missing. NPM_TOKEN is kept below
    # purely as a fallback in case OIDC trust is ever removed on npm's side; it has been
    # silently expired since ~May 2026 (see agentlog.md) and isn't load-bearing anymore -
    # safe to rotate or delete whenever convenient.
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Install native build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      # Node 22's bundled npm (10.x) predates npm's OIDC "Trusted Publishing" support
      # (needs npm >=11.5.1) - without this, @semantic-release/npm's own OIDC handshake
      # succeeds (it has its own JS logic for that), but the actual `npm publish`
      # child process it shells out to has no idea how to use the token and fails
      # with ENEEDAUTH. This has nothing to do with .nvmrc's Node version for the
      # rest of the build - only upgrading npm itself here.
      - name: Upgrade npm for OIDC trusted-publishing support
        run: npm install -g npm@11

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
